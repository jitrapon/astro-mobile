# Narrow Detekt overrides layered on top of the bundled defaults (each module sets
# buildUponDefaultConfig = true). Scope is deliberately minimal: only the two rules that conflict
# with idiomatic Jetpack Compose, which mandates PascalCase @Composable functions and inline color
# literals in theme code. Everything else honors Detekt's defaults.
#
# This is NOT a mechanism to silence findings: no baseline file is used and @Suppress remains
# forbidden (enforced separately by checkNoDetektBaseline + Detekt's ForbiddenSuppress rule). It
# corrects two rules that are simply wrong for Compose UI, not findings we are dodging.

naming:
  FunctionNaming:
    # Composable functions are PascalCase by Compose convention; exempt them from the camelCase rule.
    ignoreAnnotated: ['Composable']

style:
  MagicNumber:
    # Compose theme color definitions (e.g. Color(0xFFBB86FC)) are inherently inline hex literals;
    # the named `val` already documents intent. Exempt the theme package only.
    excludes: ['**/theme/**']
  ForbiddenSuppress:
    # Off by default in Detekt; activated to forbid silencing findings via @Suppress /
    # @SuppressWarnings. Detekt's ForbiddenSuppress only flags a suppression whose argument is
    # listed in `rules` — an empty list forbids *nothing*. So every Detekt rule id is enumerated
    # here to reject suppression of any tracked finding repo-wide, with no path/boundary excludes.
    # This pairs with the checkNoDetektBaseline gate (no baseline file) to keep both finding-dodging
    # escape hatches closed; the only way to clear a finding is to refactor.
    #
    # MAINTENANCE: this list is the full rule-id set of Detekt 1.23.8 (harvested from the plugin's
    # bundled default-detekt-config.yml). Regenerate it whenever the catalog's `detekt` version
    # changes, since new releases add rules a stale list would not cover.
    active: true
    rules:
      - AbsentOrWrongFileLicense
      - AlsoCouldBeApply
      - ArrayPrimitive
      - AvoidReferentialEquality
      - BooleanPropertyNaming
      - BracesOnIfStatements
      - BracesOnWhenStatements
      - CanBeNonNullable
      - CascadingCallWrapping
      - CastNullableToNonNullableType
      - CastToNullableType
      - ClassNaming
      - ClassOrdering
      - CognitiveComplexMethod
      - CollapsibleIfStatements
      - CommentOverPrivateFunction
      - CommentOverPrivateProperty
      - ComplexCondition
      - ComplexInterface
      - ConstructorParameterNaming
      - CouldBeSequence
      - CyclomaticComplexMethod
      - DataClassContainsFunctions
      - DataClassShouldBeImmutable
      - DeprecatedBlockTag
      - Deprecation
      - DestructuringDeclarationWithTooManyEntries
      - DontDowncastCollectionTypes
      - DoubleMutabilityForCollection
      - DoubleNegativeLambda
      - ElseCaseInsteadOfExhaustiveWhen
      - EmptyCatchBlock
      - EmptyClassBlock
      - EmptyDefaultConstructor
      - EmptyDoWhileBlock
